<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mini OJ</title>
  <style>
    body { font-family: system-ui; max-width: 1050px; margin: 30px auto; padding: 0 16px; background: #f5f7fb; color: #172033; }
    nav, section { background: #fff; padding: 18px; margin: 12px 0; border-radius: 10px; }
    input, textarea, button, select { padding: 9px; margin: 5px; }
    textarea { width: 95%; height: 220px; }
    button { cursor: pointer; }
    pre { white-space: pre-wrap; background: #f0f2f5; padding: 12px; min-height: 30px; }
  </style>
</head>
<body>
  <h1>Mini Online Judge</h1>
  <nav><span id="who">未登录</span><button onclick="logout()">登出</button></nav>
  <section><h2>注册 / 登录</h2><input id="username" placeholder="用户名"><input id="password" type="password" placeholder="密码"><button onclick="auth('login')">登录</button><button onclick="auth('register')">注册</button><p><b>用户名规则：</b>3–32 个字符，只能使用英文字母、数字、下划线和连字符，首尾不能有空格。</p><p><b>密码规则：</b>至少 8 个字符、最多 72 个 UTF-8 字节，必须同时包含至少一个字母和一个数字。</p></section>
  <section><h2>题目</h2><button onclick="loadProblems()">刷新</button><div id="problems"></div></section>
  <section><h2>提交 Python 代码</h2><input id="problemId" placeholder="题目编号"><textarea id="code">a, b = map(int, input().split())
print(a + b)</textarea><button onclick="submitCode()">提交</button></section>
  <section><h2>提交记录</h2><button onclick="loadSubs()">刷新</button><div id="subs"></div></section>
  <section id="teacherPanel" hidden><h2>教师题目管理</h2><p>填写完整题目 JSON 后创建或更新。</p><textarea id="problemJson">{"id":"P1001","title":"A+B Problem","description":"输入两个整数并输出和。","input_description":"一行两个整数。","output_description":"输出它们的和。","samples":[{"input":"1 2\n","output":"3\n"}],"constraints":"|a|, |b| <= 10^9","time_limit":1,"memory_limit":128,"difficulty":"easy","tags":["基础"],"test_cases":[{"case_id":"public","input":"1 2\n","output":"3\n","score":50,"is_hidden":false},{"case_id":"hidden","input":"5 7\n","output":"12\n","score":50,"is_hidden":true}]}</textarea><button onclick="saveProblem('POST')">创建</button><button onclick="saveProblem('PUT')">更新</button><input id="deleteProblemId" placeholder="删除题目编号"><button onclick="deleteProblem()">删除</button><h3>全部提交筛选</h3><input id="filterProblem" placeholder="题目编号"><input id="filterUser" placeholder="用户编号"><select id="filterStatus"><option value="">全部状态</option><option>pending</option><option>running</option><option>finished</option><option>failed</option></select><select id="filterResult"><option value="">全部结果</option><option>AC</option><option>WA</option><option>RE</option><option>TLE</option><option>SE</option></select><button onclick="loadTeacherSubmissions()">查询</button><div id="teacherSubmissions"></div></section>
  <section id="adminPanel" hidden><h2>管理员</h2><input id="searchUsername" placeholder="精确用户名"><button onclick="loadUsers()">查询用户</button><button onclick="createBackup()">创建备份</button><button onclick="loadBackups()">查看备份</button><input id="restoreBackupId" placeholder="备份编号"><button onclick="restoreBackup()">恢复备份</button><div id="users"></div><div id="backupList"></div></section>
  <pre id="message"></pre>
  <script>
    let currentUser = null;
    const byId = id => document.getElementById(id);
    const msg = value => byId('message').textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
    function apiError(payload) { if (payload.code === 422 && Array.isArray(payload.data)) { return payload.data.map(item => `${item.loc.slice(1).join('.')}: ${item.msg}`).join('\n'); } return payload.message || '请求失败'; }
    async function api(path, options = {}) { options.credentials = 'include'; if (options.body) options.headers = {'Content-Type': 'application/json'}; const response = await fetch('/api' + path, options); const payload = await response.json(); if (!response.ok) throw new Error(apiError(payload)); return payload.data; }
    async function auth(kind) { try { msg(await api('/auth/' + kind, {method: 'POST', body: JSON.stringify({username: byId('username').value, password: byId('password').value})})); await me(); } catch (error) { msg(error.message); } }
    async function me() { try { currentUser = await api('/auth/me'); byId('who').textContent = `${currentUser.username} (${currentUser.role})`; byId('teacherPanel').hidden = !['teacher', 'admin'].includes(currentUser.role); byId('adminPanel').hidden = currentUser.role !== 'admin'; await loadProblems(); await loadSubs(); } catch { currentUser = null; byId('who').textContent = '未登录，请先登录后查看题目'; byId('problems').textContent = '登录后显示题目列表。可使用管理员账号 admin / admin12345。'; byId('subs').textContent = '登录后显示提交记录。'; byId('teacherPanel').hidden = true; byId('adminPanel').hidden = true; } }
    async function logout() { try { await api('/auth/logout', {method: 'POST'}); await me(); } catch (error) { msg(error.message); } }
    async function loadProblems() { try { const data = await api('/problems'); byId('problems').innerHTML = data.items.map(item => `<p><button onclick="openProblem('${item.id}')">查看题目</button> <b>${item.id}</b> ${item.title} [${item.difficulty}] ${item.tags.join(' / ')}</p>`).join('') || '暂无题目'; } catch (error) { msg(error.message); } }
    async function openProblem(id) { try { const data = await api('/problems/' + encodeURIComponent(id)); byId('problemId').value = id; if (currentUser && ['teacher', 'admin'].includes(currentUser.role)) byId('problemJson').value = JSON.stringify(data, null, 2); msg(data); } catch (error) { msg(error.message); } }
    async function submitCode() { try { const data = await api('/submissions', {method: 'POST', body: JSON.stringify({problem_id: byId('problemId').value, language: 'python', source_code: byId('code').value})}); msg(data); await pollSubmission(data.submission_id); } catch (error) { msg(error.message); } }
    async function pollSubmission(id) { for (let attempt = 0; attempt < 60; attempt++) { const item = await api('/submissions/' + id); msg(item); await loadSubs(); if (['finished', 'failed'].includes(item.status)) { await details(id); return; } await new Promise(resolve => setTimeout(resolve, 1000)); } msg('评测仍在进行，请稍后手动刷新。'); }
    async function loadSubs() { try { const data = await api('/submissions'); byId('subs').innerHTML = data.items.map(item => `<p><button onclick="details('${item.id}')">查看</button>${currentUser && ['teacher', 'admin'].includes(currentUser.role) && ['finished', 'failed'].includes(item.status) ? `<button onclick="rejudge('${item.id}')">重新评测</button>` : ''} ${item.problem_id} ${item.status} ${item.result || ''} ${item.score}</p>`).join('') || '暂无提交'; } catch (error) { msg(error.message); } }
    async function details(id) { try { msg(await api('/submissions/' + id + '/logs')); } catch (error) { msg(error.message); } }
    async function rejudge(id) { try { const data = await api('/submissions/' + id + '/rejudge', {method: 'POST'}); msg(data); await pollSubmission(id); } catch (error) { msg(error.message); } }
    async function saveProblem(method) { try { const body = JSON.parse(byId('problemJson').value); const path = method === 'POST' ? '/problems' : '/problems/' + encodeURIComponent(body.id); msg(await api(path, {method, body: JSON.stringify(body)})); await loadProblems(); } catch (error) { msg(error.message); } }
    async function deleteProblem() { if (!confirm('确认删除题目？')) return; try { msg(await api('/problems/' + encodeURIComponent(byId('deleteProblemId').value), {method: 'DELETE'})); await loadProblems(); } catch (error) { msg(error.message); } }
    async function loadTeacherSubmissions() { try { const params = new URLSearchParams(); if (byId('filterProblem').value) params.set('problem_id', byId('filterProblem').value); if (byId('filterUser').value) params.set('user_id', byId('filterUser').value); if (byId('filterStatus').value) params.set('status', byId('filterStatus').value); if (byId('filterResult').value) params.set('result', byId('filterResult').value); const data = await api('/submissions?' + params); byId('teacherSubmissions').innerHTML = data.items.map(item => `<p><button onclick="details('${item.id}')">完整日志</button>${['finished', 'failed'].includes(item.status) ? `<button onclick="rejudge('${item.id}')">重新评测</button>` : ''} ${item.user_id} ${item.problem_id} ${item.status} ${item.result || ''} ${item.score}</p>`).join('') || '没有符合条件的提交'; } catch (error) { msg(error.message); } }
    async function loadUsers() { try { const username = byId('searchUsername').value; const path = username ? '/users?username=' + encodeURIComponent(username) : '/users?page_size=100'; const data = await api(path); byId('users').innerHTML = data.items.map(user => `<p>${user.username} <select id="role-${user.id}"><option ${user.role === 'student' ? 'selected' : ''}>student</option><option ${user.role === 'teacher' ? 'selected' : ''}>teacher</option><option ${user.role === 'admin' ? 'selected' : ''}>admin</option></select><label><input id="active-${user.id}" type="checkbox" ${user.is_active ? 'checked' : ''}>启用</label><button onclick="updateUser('${user.id}')">保存</button></p>`).join('') || '未找到用户'; } catch (error) { msg(error.message); } }
    async function updateUser(id) { try { msg(await api('/users/' + id, {method: 'PUT', body: JSON.stringify({role: byId('role-' + id).value, is_active: byId('active-' + id).checked})})); await loadUsers(); } catch (error) { msg(error.message); } }
    async function createBackup() { try { msg(await api('/admin/backups', {method: 'POST'})); await loadBackups(); } catch (error) { msg(error.message); } }
    async function loadBackups() { try { const data = await api('/admin/backups'); byId('backupList').innerHTML = data.items.map(item => `<p><button onclick="byId('restoreBackupId').value='${item.backup_id}'">选择</button> ${item.backup_id} ${item.created_at}</p>`).join('') || '暂无备份'; } catch (error) { msg(error.message); } }
    async function restoreBackup() { if (!confirm('恢复会覆盖当前系统数据，确认继续？')) return; try { const id = byId('restoreBackupId').value; msg(await api('/admin/backups/' + encodeURIComponent(id) + '/restore', {method: 'POST'})); await me(); } catch (error) { msg(error.message); } }
    me();
  </script>
</body>
</html>
